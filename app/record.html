<main>

  <body style="background-color:#C9A9A6;">

    <div class="container py-5">

      <div class="row justify-content-center">

        <div class="col-lg-9">

          <div class="card border-0 shadow-lg rounded-4">

            <div class="card-body p-5">

              <div class="text-center mb-4">

                <i class="bi bi-person-plus-fill display-3" style="color:#7A9E7E;"></i>

                <h2 class="fw-bold mt-3">

                  Crear una cuenta

                </h2>

                <p class="text-secondary">

                  Completa el formulario para comenzar tu proceso de bienestar.

                </p>

              </div>

              <form>

                <div class="row">

                  <div class="col-md-6 mb-3">

                    <div class="form-floating">

                      <input type="text" class="form-control" id="nombre" placeholder="Nombre">

                      <label for="nombre">

                        <i class="bi bi-person"></i>

                        Nombre

                      </label>

                    </div>

                  </div>

                  <div class="col-md-6 mb-3">

                    <div class="form-floating">

                      <input type="text" class="form-control" id="apellido" placeholder="Apellido">

                      <label for="apellido">

                        <i class="bi bi-person"></i>

                        Apellidos

                      </label>

                    </div>

                  </div>

                  <div class="col-md-6 mb-3">

                    <div class="form-floating">

                      <input type="email" class="form-control" id="correo" placeholder="Correo">

                      <label for="correo">

                        <i class="bi bi-envelope"></i>

                        Correo electrónico

                      </label>

                    </div>

                  </div>

                  <div class="col-md-6 mb-3">

                    <div class="form-floating">

                      <input type="tel" class="form-control" id="telefono" placeholder="Teléfono">

                      <label for="telefono">

                        <i class="bi bi-telephone"></i>

                        Teléfono

                      </label>

                    </div>

                  </div>

                  <div class="col-md-6 mb-3">

                    <div class="form-floating">

                      <input type="date" class="form-control" id="fecha">

                      <label for="fecha">

                        Fecha de nacimiento

                      </label>

                    </div>

                  </div>

                  <div class="col-md-6 mb-3">

                    <div class="form-floating">

                      <select class="form-select" id="genero">

                        <option selected>Selecciona</option>

                        <option>Femenino</option>

                        <option>Masculino</option>

                        <option>Prefiero no decirlo</option>

                      </select>

                      <label for="genero">

                        Género

                      </label>

                    </div>

                  </div>

                  <div class="col-md-6 mb-3">

                    <div class="form-floating">

                      <input type="password" class="form-control" id="password" placeholder="Contraseña">

                      <label for="password">

                        <i class="bi bi-lock"></i>

                        Contraseña

                      </label>

                    </div>

                  </div>

                  <div class="col-md-6 mb-4">

                    <div class="form-floating">

                      <input type="password" class="form-control" id="confirmar" placeholder="Confirmar">

                      <label for="confirmar">

                        <i class="bi bi-shield-lock"></i>

                        Confirmar contraseña

                      </label>

                    </div>

                  </div>

                </div>

                <div class="form-check mb-4">

                  <input class="form-check-input" type="checkbox" id="terminos">

                  <label class="form-check-label" for="terminos">

                    Acepto los términos y condiciones.

                  </label>

                </div>

                <button class="btn w-100 text-white py-2" style="background-color:#3D5A40;">

                  <i class="bi bi-person-check-fill"></i>

                  Crear cuenta

                </button>

              </form>

              <hr>

              <div class="text-center mt-3">

                ¿Ya tienes una cuenta?

                <a href="login.html" class="fw-bold text-decoration-none" style="color:#2F4F46;"">

                Iniciar sesión

              </a>

            </div>

            <div class=" text-center mt-4">

                  <a href="../index.html" class="btn btn-outline-secondary rounded-pill">

                    <i class="bi bi-arrow-left-circle"></i>

                    Volver al inicio

                  </a>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</main>

</html>
